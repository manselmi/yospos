# vim: set ft=yaml :


name: 'check'

on:
  push:

defaults:
  run:
    shell: 'bash -euo pipefail {0}'

permissions:
  contents: 'read'

jobs:
  check:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v7'
      - uses: 'jdx/mise-action@v4'
      - run: 'mise run check'
      - run: 'mise run build'
